<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Iron Record is a lightweight workout tracker for logging sessions, tracking targets, and restoring automatic snapshots.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Record">
<meta name="theme-color" content="#0e0e0e">
<meta name="mobile-web-app-capable" content="yes">
<title>Iron Record</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/favicon-32.png?v=3" type="image/png" sizes="32x32">
<link rel="icon" href="./icons/favicon-16.png?v=3" type="image/png" sizes="16x16">
<link rel="shortcut icon" href="./icons/favicon-32.png?v=3" type="image/png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-mid: rgba(200,241,53,0.3);
    --text: #e8e8e8;
    --muted: #666;
    --danger: #ff5c5c;
    --warn: #f5a623;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px calc(80px + env(safe-area-inset-bottom)); }

  /* HEADER */
  header {
    padding: calc(36px + env(safe-area-inset-top)) 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
  }
  .logo img {
    display: block;
    width: min(180px, 26vw);
    height: auto;
  }
  .date-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); padding: 6px 12px; border-radius: 3px;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 28px;
    border-bottom: 1px solid var(--border); padding-bottom: 0;
  }
  .tab {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer; border: none; background: none; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* BLOCK HEADER */
  .block-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .block-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--text); }
  .block-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  /* ADD SESSION */
  .add-session-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
  }
  input[type="date"] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 12px; border-radius: 4px;
    outline: none; transition: border 0.15s;
  }
  input[type="date"]:focus { border-color: var(--accent); }
  .btn {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    padding: 9px 16px; border-radius: 4px; border: none; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #0e0e0e; font-weight: 600; }
  .btn-primary:hover { background: #d9ff4d; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn-danger { background: none; border: 1px solid transparent; color: var(--danger); font-size: 11px; padding: 4px 8px; }
  .btn-danger:hover { border-color: var(--danger); }
  .btn-small { padding: 5px 10px; font-size: 10px; }

  /* SESSION CARD */
  .session { margin-bottom: 24px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .session-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--surface2); border-radius: 6px 6px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    cursor: pointer; user-select: none;
  }
  .session-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }
  .session-summary { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .collapse-icon { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
  .session.collapsed .collapse-icon { transform: rotate(-90deg); }

  .session-body {
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 6px 6px; overflow: hidden;
  }
  .session.collapsed .session-body { display: none; }

  /* EXERCISE TABLE */
  .exercise-block { border-bottom: 1px solid var(--border); }
  .exercise-block:last-child { border-bottom: none; }

  .exercise-name-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px 6px;
    background: rgba(255,255,255,0.02);
  }
  .exercise-label {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px;
    color: var(--text); text-transform: uppercase;
  }
  .unclear-badge {
    font-size: 9px; background: rgba(245,166,35,0.15); color: var(--warn);
    border: 1px solid rgba(245,166,35,0.3); padding: 2px 6px; border-radius: 2px;
    font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-left: 8px;
  }

  /* Fix: wrap table in scrollable container */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .sets-table { width: max-content; min-width: 100%; border-collapse: collapse; }
  .sets-table th {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding: 5px 14px; text-align: left; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2); white-space: nowrap;
  }
  .sets-table td { padding: 5px 14px; vertical-align: middle; white-space: nowrap; }
  .sets-table tr:hover td { background: rgba(255,255,255,0.02); }

  .set-num {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 30px;
  }
  .set-input {
    background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 3px 4px; width: 60px; outline: none; transition: border-color 0.15s;
    text-align: center;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input.wide { width: 90px; }
  .set-input.notes-input { width: 140px; text-align: left; }
  .set-input.target-input { width: 140px; text-align: left; color: var(--accent); }
  .set-input::placeholder { color: var(--muted); opacity: 0.5; }
  .rir-failure { color: var(--danger) !important; }

  .add-set-row td { padding: 4px 14px 8px; }

  /* PREV SESSION COMPARISON */
  .prev-session-banner {
    margin: 0 0 0 0;
    border-bottom: 1px solid var(--border);
    background: rgba(200,241,53,0.04);
  }
  .prev-banner-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; cursor: pointer; user-select: none;
  }
  .prev-banner-title {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 8px;
  }
  .prev-banner-date { color: var(--muted); font-size: 9px; }
  .prev-toggle { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
  .prev-session-body { padding: 0 0 8px; }
  .prev-ex-block { padding: 6px 14px; }
  .prev-ex-name {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 4px;
  }
  .prev-sets-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .prev-set-chip {
    font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 2px; color: var(--text);
  }
  .prev-set-chip .chip-target { color: var(--accent); margin-left: 4px; font-size: 9px; }
  .no-prev { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); padding: 8px 14px; }

  /* EXERCISE ADD SECTION */
  .add-exercise-row {
    padding: 10px 14px;
    background: rgba(0,0,0,0.15);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .exercise-select-input {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 10px;
    border-radius: 4px; outline: none; flex: 1; min-width: 160px; transition: border 0.15s;
  }
  .exercise-select-input:focus { border-color: var(--accent); }

  /* TARGET SECTION */
  .target-row { background: rgba(200,241,53,0.03); }
  .target-label {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent);
    text-transform: uppercase; opacity: 0.7;
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }

  /* FOOTER ACTIONS */
  .session-actions { padding: 10px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border); }

  /* HISTORY VIEW */
  .history-grid {
    display: grid; gap: 12px;
  }
  .history-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; cursor: pointer; transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }
  .history-card:hover { border-color: var(--accent); }
  .history-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--surface2);
  }
  .history-card-left { display: flex; align-items: center; gap: 16px; }
  .history-block-pill {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; border: 1px solid;
  }
  .pill-chest { color: #7eb8f7; border-color: rgba(126,184,247,0.3); background: rgba(126,184,247,0.08); }
  .pill-shoulders { color: #c084fc; border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.08); }
  .pill-legs { color: #fb923c; border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.08); }
  .history-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }
  .history-stats { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .history-exercises-preview {
    padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .ex-chip {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 2px;
  }
  .history-expanded-body {
    border-top: 1px solid var(--border);
  }
  .history-filter-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 12px; border-radius: 3px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--text); }
  .filter-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  .sort-select {
    margin-left: auto;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px;
    border-radius: 3px; outline: none; cursor: pointer;
  }

  /* BACKUP BAR */
  .backup-bar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 24px;
  }
  .backup-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; flex: 1; }
  .backup-status {
    font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px;
    border-radius: 2px; letter-spacing: 1px;
  }
  .backup-status.ok { color: var(--accent); background: var(--accent-dim); }
  .backup-status.warn { color: var(--warn); background: rgba(245,166,35,0.1); }
  .db-indicator {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    display: inline-block; margin-right: 6px; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .sets-table th:nth-child(5), .sets-table td:nth-child(5) { display: none; }
    header { align-items: center; }
    .logo img { width: min(150px, 42vw); }
  }
</style>
</head>

<script>
// ─── IndexedDB STORAGE ───────────────────────────────────────────────────────

const DB_NAME = 'ironRecord';
const DB_VERSION = 2;
const STORE = 'workoutState';
let db = null;
let storageMode = 'indexeddb';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(STORE)) {
        database.createObjectStore(STORE);
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbSet(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function localGet(key) {
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : null;
}

function localSet(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

async function storageGet(key) {
  return storageMode === 'indexeddb' ? dbGet(key) : localGet(key);
}

async function storageSet(key, value) {
  if (storageMode === 'indexeddb') await dbSet(key, value);
  else localSet(key, value);
}

function cloneState(data) {
  if (typeof structuredClone === 'function') return structuredClone(data);
  return JSON.parse(JSON.stringify(data));
}

const AUTO_BACKUP_KEY = 'autoBackups';
const AUTO_BACKUP_META_KEY = 'autoBackupMeta';
const AUTO_BACKUP_LIMIT = 24;
const AUTO_BACKUP_DEBOUNCE_MS = 1500;
const AUTO_BACKUP_MIN_INTERVAL_MS = 2 * 60 * 1000;

let autoBackups = [];
let backupMeta = { lastSavedAt: null, lastAutoBackupAt: null };
let autoBackupTimer = null;

function serializeBackup(snapshotState, extras = {}) {
  return {
    version: 1,
    exported: new Date().toISOString(),
    data: snapshotState,
    ...extras,
  };
}

async function persistBackupArtifacts() {
  await storageSet(AUTO_BACKUP_KEY, autoBackups);
  await storageSet(AUTO_BACKUP_META_KEY, backupMeta);
}

function formatTime(ts) {
  if (!ts) return 'NEVER';
  return new Date(ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function formatSnapshotLabel(ts) {
  if (!ts) return 'UNKNOWN';
  return new Date(ts).toLocaleString('en-US', {
    month: 'short',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
  }).toUpperCase();
}

async function createAutoBackup(reason = 'autosave', force = false) {
  const now = Date.now();
  const lastBackupAt = backupMeta.lastAutoBackupAt ? new Date(backupMeta.lastAutoBackupAt).getTime() : 0;
  if (!force && now - lastBackupAt < AUTO_BACKUP_MIN_INTERVAL_MS) return false;

  autoBackups.unshift({
    id: `auto-${now}`,
    createdAt: new Date(now).toISOString(),
    reason,
    payload: serializeBackup(cloneState(state), { source: 'auto' }),
  });
  autoBackups = autoBackups.slice(0, AUTO_BACKUP_LIMIT);
  backupMeta.lastAutoBackupAt = new Date(now).toISOString();
  await persistBackupArtifacts();
  updateBackupStatus();
  return true;
}

function scheduleAutoBackup(reason = 'autosave') {
  clearTimeout(autoBackupTimer);
  autoBackupTimer = setTimeout(() => {
    createAutoBackup(reason).catch(err => console.warn('Automatic backup failed', err));
  }, AUTO_BACKUP_DEBOUNCE_MS);
}

async function save() {
  backupMeta.lastSavedAt = new Date().toISOString();
  await storageSet('state', state);
  await storageSet(AUTO_BACKUP_META_KEY, backupMeta);
  updateBackupStatus();
  scheduleAutoBackup('edit');
}

// ─── DATA ───────────────────────────────────────────────────────────────────

const BLOCKS = ['Chest / Back', 'Shoulders / Arms', 'Legs'];

const DEFAULT_EXERCISE_LIBRARY = {
  'Chest / Back': ['Supine Chest Press','Incline Dumbbell Press','Pec Fly','Seated Cable Row (medium wide attachment)','Lat Pulldown','Cable Row','Pull-up','Face Pull'],
  'Shoulders / Arms': ['Chest Supported Row','Machine Curls','Overhead Cable Extension','Pushdown','Lateral Raise','Arnold Press','EZ Bar Curl','Hammer Curl','Skull Crusher'],
  'Legs': ['Hack Squat','Leg Curl','Leg Extension','Pin-Loaded Leg Press','Seated Calf Extension','Ab Crunch Machine','Romanian Deadlift','Leg Press','Standing Calf Raise'],
};

const CUSTOM_EXERCISE_LIBRARY_KEY = 'customExerciseLibrary';
let customExerciseLibrary = {};

function getExerciseOptions(block) {
  const defaults = DEFAULT_EXERCISE_LIBRARY[block] || [];
  const custom = customExerciseLibrary[block] || [];
  return [...new Set([...defaults, ...custom])];
}

async function saveCustomExerciseLibrary() {
  await storageSet(CUSTOM_EXERCISE_LIBRARY_KEY, customExerciseLibrary);
}

async function ensureExerciseInLibrary(block, name) {
  const trimmed = String(name || '').trim();
  if (!trimmed) return;
  if (getExerciseOptions(block).includes(trimmed)) return;
  if (!customExerciseLibrary[block]) customExerciseLibrary[block] = [];
  customExerciseLibrary[block].push(trimmed);
  await saveCustomExerciseLibrary();
}

function updateBackupStatus() {
  const el = document.getElementById('backupStatus');
  if (!el) return;
  const hasAutoBackup = !!backupMeta.lastAutoBackupAt;
  el.className = `backup-status ${hasAutoBackup ? 'ok' : 'warn'}`;
  el.textContent = `SAVE ${formatTime(backupMeta.lastSavedAt)} · AUTO ${hasAutoBackup ? formatTime(backupMeta.lastAutoBackupAt) : 'PENDING'}`;
}

function exportBackup() {
  const json = JSON.stringify(serializeBackup(state, { source: 'manual' }), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date().toISOString().split('T')[0];
  a.download = `iron-record-backup-${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function restoreAutoBackup() {
  if (!autoBackups.length) {
    alert('No automatic snapshots available yet. Make a few edits and Iron Record will create them automatically.');
    return;
  }

  const preview = autoBackups.slice(0, 8).map((backup, index) =>
    `${index + 1}. ${formatSnapshotLabel(backup.createdAt)}${backup.reason ? ` (${backup.reason})` : ''}`
  ).join('\n');
  const pick = prompt(`Restore one of the latest automatic snapshots:\n\n${preview}\n\nEnter a number to restore.`);
  if (pick === null) return;
  const chosen = autoBackups[Number(pick) - 1];
  if (!chosen) {
    alert('Invalid selection.');
    return;
  }

  if (!confirm(`Restore the automatic snapshot from ${formatSnapshotLabel(chosen.createdAt)}? This will replace your current data.`)) return;
  await createAutoBackup('pre-auto-restore', true);
  state = cloneState(chosen.payload.data || chosen.payload);
  await save();
  renderTabs();
  if (currentBlock === 'HISTORY') renderHistory();
  else renderBlock();
  alert('Automatic snapshot restored.');
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const imported = parsed.data || parsed;
      // Validate basic structure
      const valid = BLOCKS.some(b => Array.isArray(imported[b]));
      if (!valid) { alert('Invalid backup file.'); return; }
      if (!confirm(`This will replace all current data with the backup from ${parsed.exported ? new Date(parsed.exported).toLocaleDateString() : 'unknown date'}. Continue?`)) return;
      await createAutoBackup('pre-import-restore', true);
      state = imported;
      await save();
      renderTabs();
      if (currentBlock === 'HISTORY') renderHistory();
      else renderBlock();
      alert('Backup restored successfully.');
    } catch(err) {
      alert('Could not read backup file: ' + err.message);
    }
  };
  input.click();
}

function parsePrimaryNumber(value) {
  const match = String(value || '').match(/-?\d+(?:\.\d+)?/);
  return match ? Number(match[0]) : null;
}

function parseLoadValue(load) {
  const raw = String(load || '').trim();
  if (!raw) return null;
  const match = raw.match(/^(\d+(?:\.\d+)?)(.*)$/);
  if (!match) return null;
  return {
    value: Number(match[1]),
    suffix: match[2] || '',
  };
}

function formatLoadValue(loadValue, suffix = '') {
  if (!Number.isFinite(loadValue)) return '';
  const rounded = Number.isInteger(loadValue) ? String(loadValue) : loadValue.toFixed(1).replace(/\.0$/, '');
  return `${rounded}${suffix}`;
}

function loadIncrementFor(setLoad) {
  if (!setLoad) return 5;
  if (setLoad.suffix.trim().toLowerCase() === 's') return 5;
  if (!Number.isInteger(setLoad.value)) return 2.5;
  if (setLoad.value >= 200) return 10;
  return 5;
}

function buildTargetFromSet(set) {
  const load = parseLoadValue(set.load);
  const reps = parsePrimaryNumber(set.reps);
  if (!load || reps === null) return set.target || '';

  const rirText = String(set.rir || '').toLowerCase();
  const rir = parsePrimaryNumber(set.rir);
  const hitTopEnd = reps >= 12 || (rir !== null && rir >= 2);
  const shouldAddLoad = hitTopEnd && !rirText.includes('fail');

  if (shouldAddLoad) {
    const nextLoad = formatLoadValue(load.value + loadIncrementFor(load), load.suffix);
    return `${nextLoad} × ${reps}`;
  }

  return `${formatLoadValue(load.value, load.suffix)} × ${reps + 1}`;
}

function findPreviousExercise(si, exerciseName) {
  for (let i = si - 1; i >= 0; i--) {
    const prevSession = state[currentBlock]?.[i];
    const prevExercise = prevSession?.exercises?.find(ex => ex.name === exerciseName);
    if (prevExercise) return prevExercise;
  }
  return null;
}

function generateTargetsForSession(si) {
  const session = state[currentBlock]?.[si];
  if (!session) return;

  let updatedSets = 0;
  let matchedExercises = 0;

  session.exercises.forEach(exercise => {
    const previousExercise = findPreviousExercise(si, exercise.name);
    if (!previousExercise) return;
    matchedExercises += 1;

    exercise.sets.forEach((set, setIndex) => {
      const sourceSet = previousExercise.sets[setIndex] || previousExercise.sets[previousExercise.sets.length - 1];
      if (!sourceSet) return;
      const target = buildTargetFromSet(sourceSet);
      if (!target) return;
      set.target = target;
      updatedSets += 1;
    });
  });

  if (!updatedSets) {
    alert('No previous matching exercises were found for this session yet.');
    return;
  }

  save();
  renderBlock();
  alert(`Generated ${updatedSets} targets across ${matchedExercises} exercise${matchedExercises === 1 ? '' : 's'}.`);
}

function switchBlock(b) {

let historyFilter = 'ALL';
let historySort = 'newest';
let historyExpanded = {};

function pillClass(block) {
  if (block.includes('Chest')) return 'pill-chest';
  if (block.includes('Shoulder')) return 'pill-shoulders';
  return 'pill-legs';
}

function renderHistory() {
  const container = document.getElementById('blockContent');
  let all = [];
  BLOCKS.forEach(block => {
    (state[block] || []).forEach((session, si) => all.push({ block, si, session }));
  });
  const filtered = historyFilter === 'ALL' ? all : all.filter(e => e.block === historyFilter);
  filtered.sort((a, b) => {
    const da = a.session.date || '', db = b.session.date || '';
    return historySort === 'newest' ? db.localeCompare(da) : da.localeCompare(db);
  });

  const filterBtns = ['ALL', ...BLOCKS].map(f =>
    `<button class="filter-btn ${historyFilter === f ? 'active' : ''}" onclick="setHistoryFilter('${f.replace(/'/g,"\\'")}')">
      ${f === 'ALL' ? 'ALL BLOCKS' : f}
    </button>`
  ).join('');

  let html = `
    <div class="backup-bar">
      <span class="backup-label"><span class="db-indicator"></span>${storageMode.toUpperCase()} STORAGE · AUTOMATIC SNAPSHOTS ENABLED</span>
      <span class="backup-status ok" id="backupStatus">READY</span>
      <button class="btn btn-ghost btn-small" onclick="restoreAutoBackup()">↺ AUTO SNAPSHOTS</button>
      <button class="btn btn-ghost btn-small" onclick="exportBackup()">⬇ EXPORT BACKUP</button>
      <button class="btn btn-ghost btn-small" onclick="importBackup()">⬆ RESTORE BACKUP</button>
    </div>
    <div class="block-header">
      <div class="block-title">SESSION HISTORY</div>
      <div class="block-meta">${filtered.length} SESSION${filtered.length !== 1 ? 'S' : ''}</div>
    </div>
    <div class="history-filter-bar">
      ${filterBtns}
      <select class="sort-select" onchange="setHistorySort(this.value)">
        <option value="newest" ${historySort==='newest'?'selected':''}>NEWEST FIRST</option>
        <option value="oldest" ${historySort==='oldest'?'selected':''}>OLDEST FIRST</option>
      </select>
    </div>`;

  if (filtered.length === 0) {
    html += `<div class="history-empty"><div class="empty-icon">◎</div>No sessions found.</div>`;
  } else {
    html += `<div class="history-grid">`;
    filtered.forEach(({ block, si, session }) => {
      const key = `${block}::${si}`;
      const isExpanded = !!historyExpanded[key];
      const exCount = session.exercises.length;
      const setCount = session.exercises.reduce((a, e) => a + e.sets.length, 0);
      const chipPreview = session.exercises.slice(0, 5).map(e => `<span class="ex-chip">${e.name}</span>`).join('')
        + (session.exercises.length > 5 ? `<span class="ex-chip">+${session.exercises.length - 5} more</span>` : '');
      const expandedHtml = isExpanded ? `<div class="history-expanded-body">${session.exercises.map(ex => renderExerciseReadOnly(ex)).join('')}</div>` : '';
      html += `
        <div class="history-card">
          <div class="history-card-header" onclick="toggleHistoryCard('${key.replace(/'/g,"\\'")}')">
            <div class="history-card-left">
              <span class="history-block-pill ${pillClass(block)}">${block}</span>
              <span class="history-date">${formatDate(session.date)}</span>
              <span class="history-stats">${exCount} ex · ${setCount} sets</span>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${isExpanded ? '▲ HIDE' : '▼ EXPAND'}</span>
          </div>
          <div class="history-exercises-preview">${chipPreview}</div>
          ${expandedHtml}
        </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function toggleHistoryCard(key) { historyExpanded[key] = !historyExpanded[key]; renderHistory(); }
function setHistoryFilter(f) { historyFilter = f; historyExpanded = {}; renderHistory(); }
function setHistorySort(v) { historySort = v; renderHistory(); }

function getNextBlockInSplit(block) {
  const index = BLOCKS.indexOf(block);
  if (index === -1) return BLOCKS[0];
  return BLOCKS[(index + 1) % BLOCKS.length];
}

function getLatestLoggedSessionInfo() {
  let latest = null;

  BLOCKS.forEach((block, blockIndex) => {
    (state[block] || []).forEach((session, sessionIndex) => {
      const stamp = session.date || '';
      if (!latest || stamp > latest.date || (stamp === latest.date && sessionIndex >= latest.sessionIndex && blockIndex >= latest.blockIndex)) {
        latest = { block, blockIndex, sessionIndex, date: stamp };
      }
    });
  });

  return latest;
}

function getSuggestedNextBlock() {
  const latest = getLatestLoggedSessionInfo();
  return latest ? getNextBlockInSplit(latest.block) : BLOCKS[0];
}

function createEmptySet() {
  return { load:'', reps:'', rir:'', notes:'', target:'' };
}

function buildDefaultExercisesForBlock(block) {
  return getExerciseOptions(block).map(name => ({
    name,
    sets: [createEmptySet()],
  }));
}

function toggleSession(si) {
  state[currentBlock][si].collapsed = !state[currentBlock][si].collapsed;
  save(); renderBlock();
}

function addSession() {
  const d = document.getElementById('newSessionDate').value || today();
  const targetBlock = getSuggestedNextBlock();
  currentBlock = targetBlock;
  if (!state[targetBlock]) state[targetBlock] = [];
  state[targetBlock].push({
    date: d,
    collapsed: false,
    exercises: buildDefaultExercisesForBlock(targetBlock),
  });
  save();
  renderTabs();
  renderBlock();
}

function deleteSession(si) {
  if (!confirm('Delete this session?')) return;
  state[currentBlock].splice(si, 1);
  save(); renderBlock();
}

async function addExercise(si) {
  const input = document.getElementById(`exInput-${si}`);
  const name = input.value.trim();
  if (!name) return;
  await ensureExerciseInLibrary(currentBlock, name);
  state[currentBlock][si].exercises.push({ name, sets: [createEmptySet()] });
  input.value = '';
  save(); renderBlock();
}

function deleteExercise(si, ei) {
  state[currentBlock][si].exercises.splice(ei, 1);
  save(); renderBlock();
}

function addSet(si, ei) {
  state[currentBlock][si].exercises[ei].sets.push(createEmptySet());
  save(); renderBlock();
}

function deleteSet(si, ei, seti) {
  state[currentBlock][si].exercises[ei].sets.splice(seti, 1);
  save(); renderBlock();
}

function updateSet(si, ei, seti, field, val) {
  state[currentBlock][si].exercises[ei].sets[seti][field] = val;
  save();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────

function today() { return new Date().toISOString().split('T')[0]; }

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

async function init() {
  await openDB();
  const [saved, savedBackups, savedBackupMeta, savedCustomExerciseLibrary] = await Promise.all([
    storageGet('state'),
    storageGet(AUTO_BACKUP_KEY),
    storageGet(AUTO_BACKUP_META_KEY),
    storageGet(CUSTOM_EXERCISE_LIBRARY_KEY),
  ]);
  state = saved || SEED_DATA;
  autoBackups = Array.isArray(savedBackups) ? savedBackups : [];
  backupMeta = savedBackupMeta || { lastSavedAt: null, lastAutoBackupAt: null };
  customExerciseLibrary = savedCustomExerciseLibrary || {};
  currentBlock = getSuggestedNextBlock();
  document.getElementById('todayBadge').textContent = formatDate(today());
  renderTabs();
  renderBlock();
  if (!saved) {
    await save();
    await createAutoBackup('seed', true);
  } else {
    updateBackupStatus();
  }
}

init().catch(err => {
  console.warn('IndexedDB failed, falling back to localStorage', err);
  storageMode = 'localStorage';
  state = localGet('state') || localGet('ironRecord_v2') || SEED_DATA;
  autoBackups = localGet(AUTO_BACKUP_KEY) || [];
  backupMeta = localGet(AUTO_BACKUP_META_KEY) || { lastSavedAt: null, lastAutoBackupAt: null };
  customExerciseLibrary = localGet(CUSTOM_EXERCISE_LIBRARY_KEY) || {};
  currentBlock = getSuggestedNextBlock();
  document.getElementById('todayBadge').textContent = formatDate(today());
  renderTabs();
  renderBlock();
  if (!localGet('state') && localGet('ironRecord_v2')) {
    save();
  } else {
    updateBackupStatus();
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.warn('Service worker registration failed', err);
    });
  });
}
</script>
